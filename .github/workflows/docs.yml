name: Render and deploy Quarto docs

on:
  push:
    branches: [main]
    paths:
      - "docs/quarto/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/quarto/**"
      - ".github/workflows/docs.yml"
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; keep in-progress runs to avoid partial churn.
concurrency:
  group: "pages-live-monitor"
  cancel-in-progress: false

jobs:
  build:
    name: Build monitor + render Quarto site
    runs-on: [self-hosted, linux, dsacamera]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MONITOR_OUT_DIR: .monitor_site
      SITE_OUT_DIR: docs/quarto/_site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Quarto is available
        shell: bash
        run: |
          set -euo pipefail
          quarto --version

      - name: Install dsacamera-monitor scanner
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d "/data/jfaber/dsacamera-monitor" ]]; then
            python -m pip install "/data/jfaber/dsacamera-monitor"
          else
            python -m pip install "git+https://github.com/dsa110/dsacamera-monitor.git"
          fi

      - name: Build monitor output
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "${MONITOR_OUT_DIR}"
          mkdir -p "${MONITOR_OUT_DIR}"
          dsacamera-incoming-scan --root /data/incoming --out "${MONITOR_OUT_DIR}"

      - name: Validate monitor artifact contract
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          [[ -f "${MONITOR_OUT_DIR}/index.html" ]] || { echo "Missing index.html"; exit 1; }
          [[ -f "${MONITOR_OUT_DIR}/manifest.json" ]] || { echo "Missing manifest.json"; exit 1; }
          [[ -d "${MONITOR_OUT_DIR}/css" ]] || { echo "Missing css/"; exit 1; }
          [[ -d "${MONITOR_OUT_DIR}/js" ]] || { echo "Missing js/"; exit 1; }
          python - <<'PY'
          import json
          from pathlib import Path

          manifest_path = Path(".monitor_site/manifest.json")
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          required = {
              "schema_version",
              "generated_at",
              "source_root",
              "totals",
              "by_day",
              "by_beam",
              "gaps",
              "freshness",
              "options",
          }
          missing = sorted(required - set(manifest.keys()))
          if missing:
              raise SystemExit(f"manifest missing keys: {missing}")
          if not isinstance(manifest.get("schema_version"), int):
              raise SystemExit("manifest schema_version must be int")
          if not isinstance(manifest.get("by_day"), list):
              raise SystemExit("manifest by_day must be list")
          if manifest.get("options", {}).get("no_stat", True):
              raise SystemExit("manifest options.no_stat must be false for KPI size/mtime support")
          PY

      - name: Render site
        working-directory: docs/quarto
        run: quarto render

      - name: Mount monitor under _site/dsacamera-live-monitor
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${SITE_OUT_DIR}/dsacamera-live-monitor"
          cp -r "${MONITOR_OUT_DIR}/." "${SITE_OUT_DIR}/dsacamera-live-monitor/"

      - name: Validate mounted monitor output
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          [[ -f "${SITE_OUT_DIR}/dsacamera-live-monitor/index.html" ]] || { echo "Mounted site missing index.html"; exit 1; }
          [[ -f "${SITE_OUT_DIR}/dsacamera-live-monitor/manifest.json" ]] || { echo "Mounted site missing manifest.json"; exit 1; }

      - name: Upload Pages artifact
        # Only upload on main branch (never on PRs or non-main dispatches)
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.SITE_OUT_DIR }}

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
